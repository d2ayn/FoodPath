<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>FoodPath | 지역 맛집 최단경로</title>

  <style>
    :root {
      --background: #f4f7fb;
      --card: #ffffff;
      --text: #182033;
      --sub-text: #667085;
      --line: #dce3ee;

      --primary: #174ea6;
      --primary-light: #eaf1ff;

      --restaurant: #f97316;
      --parking: #2563eb;
      --start: #16a34a;

      --node: #a50046;
      --route: #e11d48;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;

      font-family:
        Arial,
        "Noto Sans KR",
        sans-serif;

      color: var(--text);
      background: var(--background);
    }

    header {
      padding: 20px 24px;

      color: white;
      background: #111827;
    }

    header h1 {
      margin: 0;

      font-size: 25px;
    }

    header p {
      margin: 7px 0 0;

      color: #cbd5e1;
      font-size: 14px;
    }

    main {
      display: grid;

      grid-template-columns:
        minmax(0, 1.65fr)
        minmax(330px, 0.75fr);

      gap: 18px;

      width: min(1550px, 100%);
      margin: 0 auto;
      padding: 18px;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 16px;

      background: var(--card);

      box-shadow:
        0 8px 24px
        rgba(15, 23, 42, 0.07);
    }

    /* =========================
       지도 영역
    ========================= */

    .map-panel {
      padding: 12px;
    }

    .map-wrap {
      position: relative;

      width: 100%;

      overflow: hidden;

      border-radius: 12px;
      background: #edf1f6;

      aspect-ratio: 16 / 10;
    }

    .map-wrap img {
      display: block;

      width: 100%;
      height: 100%;

      object-fit: cover;
    }

    /*
      경로선을 그리는 SVG.
      viewBox는 1000 × 625 기준.
    */
    .route-svg {
      position: absolute;
      inset: 0;

      width: 100%;
      height: 100%;

      pointer-events: none;
    }

    .road-line {
      fill: none;

      stroke: rgba(165, 0, 70, 0.28);
      stroke-width: 4;

      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .selected-route {
      fill: none;

      stroke: var(--route);
      stroke-width: 8;

      stroke-linecap: round;
      stroke-linejoin: round;

      filter:
        drop-shadow(
          0 2px 3px
          rgba(0, 0, 0, 0.22)
        );
    }

    /* =========================
       지도 마커
    ========================= */

    .marker {
      position: absolute;

      display: flex;
      align-items: center;
      justify-content: center;

      transform: translate(-50%, -50%);

      border: 3px solid white;
      border-radius: 50%;

      color: white;
      font-size: 12px;
      font-weight: 800;

      cursor: pointer;

      box-shadow:
        0 3px 11px
        rgba(0, 0, 0, 0.28);

      user-select: none;
    }

    .marker.food {
      width: 31px;
      height: 31px;

      background: var(--restaurant);
    }

    .marker.parking {
      width: 31px;
      height: 31px;

      background: var(--parking);
    }

    .marker.start {
      width: 38px;
      height: 38px;

      background: var(--start);
    }

    /*
      교차로 노드.
      기본값에서는 화면에 보이게 만들어 둠.
      나중에 숨기고 싶으면 display:none 가능.
    */
    .marker.node {
      width: 25px;
      height: 25px;

      border-width: 2px;

      background: var(--node);

      font-size: 11px;
    }

    .marker:hover {
      z-index: 20;

      transform:
        translate(-50%, -50%)
        scale(1.15);
    }

    /* =========================
       오른쪽 제어 패널
    ========================= */

    .side-panel {
      padding: 18px;
    }

    .side-panel h2 {
      margin: 0 0 15px;

      font-size: 19px;
    }

    .field {
      margin-bottom: 15px;
    }

    label.title {
      display: block;

      margin-bottom: 7px;

      font-size: 13px;
      font-weight: 800;
    }

    select,
    button {
      width: 100%;

      padding: 11px 12px;

      border: 1px solid var(--line);
      border-radius: 10px;

      font-size: 14px;
    }

    select {
      color: var(--text);
      background: white;
    }

    button {
      border: none;

      color: white;
      background: var(--primary);

      font-weight: 800;

      cursor: pointer;
    }

    button:hover {
      filter: brightness(0.95);
    }

    button.secondary {
      margin-top: 9px;

      color: #3730a3;
      background: #eef2ff;
    }

    .checks {
      display: grid;

      grid-template-columns:
        repeat(2, minmax(0, 1fr));

      gap: 8px;
    }

    .check-item {
      display: flex;
      align-items: center;

      gap: 7px;

      padding: 9px;

      border: 1px solid var(--line);
      border-radius: 9px;

      font-size: 12px;
    }

    .check-item input {
      accent-color: var(--primary);
    }

    /* =========================
       결과 카드
    ========================= */

    .result {
      margin-top: 18px;
      padding-top: 17px;

      border-top: 1px solid var(--line);
    }

    .result-card {
      margin-bottom: 10px;
      padding: 13px;

      border: 1px solid var(--line);
      border-radius: 12px;

      background: #fbfcff;
    }

    .result-card strong {
      display: block;

      margin-bottom: 7px;
    }

    .meta {
      color: var(--sub-text);

      font-size: 13px;
      line-height: 1.6;
    }

    .menu {
      margin-top: 9px;
      padding-top: 9px;

      border-top: 1px dashed var(--line);

      font-size: 13px;
      line-height: 1.6;
    }

    .badge {
      display: inline-block;

      padding: 3px 7px;

      border-radius: 999px;

      color: #c2410c;
      background: #fff7ed;

      font-size: 11px;
    }

    .route-list {
      margin: 9px 0 0;
      padding-left: 20px;

      font-size: 13px;
      line-height: 1.7;
    }

    .note {
      margin-top: 14px;

      color: var(--sub-text);

      font-size: 12px;
      line-height: 1.5;
    }

    @media (max-width: 900px) {
      main {
        grid-template-columns: 1fr;
      }

      .map-wrap {
        aspect-ratio: 4 / 3;
      }
    }
  </style>
</head>

const graph = {};

  if (!graph[from]) {
    graph[from] = [];
  }

  graph[from].push({
    to: to,
    distance: distance
  });

}

/* =====================================================
   13. 다익스트라 알고리즘

   출발지부터 목적지까지
   실제 도로를 따라 최단거리를 계산함.
   ===================================================== */

function dijkstra(startId, endId) {

  const distances = {};
  const previous = {};

  const unvisited =
    new Set(
      Object.keys(graph)
    );

  Object.keys(graph).forEach(
    nodeId => {

      distances[nodeId] =
        Infinity;

      previous[nodeId] =
        null;

    }
  );

  distances[startId] = 0;


  while (unvisited.size > 0) {

    let currentNode = null;


    unvisited.forEach(
      nodeId => {

        if (
          currentNode === null ||
          distances[nodeId] <
          distances[currentNode]
        ) {

          currentNode = nodeId;

        }

      }
    );


    if (
      currentNode === null ||
      distances[currentNode] === Infinity
    ) {

      break;

    }


    if (currentNode === endId) {
      break;
    }


    unvisited.delete(currentNode);


    const connectedRoads =
      graph[currentNode] || [];


    connectedRoads.forEach(
      edge => {

        if (
          !unvisited.has(edge.to)
        ) {
          return;
        }


        const newDistance =
          distances[currentNode] +
          edge.distance;


        if (
          newDistance <
          distances[edge.to]
        ) {

          distances[edge.to] =
            newDistance;

          previous[edge.to] =
            currentNode;

        }

      }
    );

  }


  if (
    distances[endId] === Infinity
  ) {

    return {
      distance: Infinity,
      path: []
    };

  }


  const path = [];

  let current = endId;


  while (current !== null) {

    path.unshift(current);

    current =
      previous[current];

  }


  return {
    distance:
      distances[endId],

    path: path
  };

}

}

   점수가 작을수록 추천 순위가 높음.
   ===================================================== */

function calculateRecommendationScore(
  placeId,
  priority
) {

  const place =
    places[placeId];


  const routeResult =
    dijkstra(
      "school",
      placeId
    );


  const distance =
    routeResult.distance;


  if (distance === Infinity) {
    return Infinity;
  }


  if (
    priority === "distance"
  ) {

    return distance;

  }


  if (
    priority === "price"
  ) {

    return (
      place.minPrice +
      distance * 2
    );

  }


  if (
    priority === "parking"
  ) {

    return (
      distance -
      place.parkingScore * 150
    );

  }


  /* 거리·가격·주차 균형 */

  return (

    distance * 1.2 +

    place.minPrice * 0.15 -

    place.parkingScore * 100

  );

}

/* =====================================================
   21. 두 장소 사이 도로 거리 계산
   ===================================================== */

function getRoadDistance(
  fromId,
  toId
) {

  const result =
    dijkstra(
      fromId,
      toId
    );


  return result.distance;

}


/* =====================================================
   22. 여러 맛집 방문 순서 계산

   현재 위치에서 가장 가까운
   다음 장소를 선택하는
   최근접 이웃 방식 사용.
   ===================================================== */

function calculateVisitOrder(
  startId,
  selectedIds
) {

  const remaining =
    [...selectedIds];


  const visitOrder =
    [startId];


  let currentId =
    startId;


  while (
    remaining.length > 0
  ) {

    let closestId = null;

    let closestDistance =
      Infinity;


    remaining.forEach(
      candidateId => {

        const candidateDistance =
          getRoadDistance(
            currentId,
            candidateId
          );


        if (
          candidateDistance <
          closestDistance
        ) {

          closestDistance =
            candidateDistance;

          closestId =
            candidateId;

        }

      }
    );


    if (
      closestId === null
    ) {

      break;

    }


    visitOrder.push(
      closestId
    );


    remaining.splice(
      remaining.indexOf(
        closestId
      ),
      1
    );


    currentId =
      closestId;

  }


  return visitOrder;

}


/* =====================================================
   23. 여러 구간 경로를 하나로 합치기
   ===================================================== */

function combineRoutePaths(
  visitOrder
) {

  let completePath = [];

  let totalDistance = 0;


  for (
    let index = 1;
    index < visitOrder.length;
    index++
  ) {

    const fromId =
      visitOrder[index - 1];

    const toId =
      visitOrder[index];


    const routeResult =
      dijkstra(
        fromId,
        toId
      );


    totalDistance +=
      routeResult.distance;


    if (
      completePath.length === 0
    ) {

      completePath.push(
        ...routeResult.path
      );

    }

    else {

      /*
        앞 구간의 마지막 노드와
        다음 구간의 첫 노드가 중복되므로
        첫 번째 항목은 제외함.
      */

      completePath.push(
        ...routeResult.path.slice(1)
      );

    }

  }


  return {
    path: completePath,
    distance: totalDistance
  };

}

/* =====================================================
   25. 초기화 버튼
   ===================================================== */

resetButton.addEventListener(
  "click",
  function () {

    document
      .querySelectorAll(
        ".check-item input"
      )
      .forEach(
        checkbox => {

          checkbox.checked =
            false;

        }
      );


    routeLine.setAttribute(
      "points",
      ""
    );


    resultBox.innerHTML = `

      <div class="result-card">

        <strong>
          사용 방법
        </strong>

        <div class="meta">

          조건을 설정해 장소를 추천받거나,
          여러 장소를 선택해 실제 도로를
          따라가는 방문 경로를 계산할 수 있습니다.

        </div>

      </div>

    `;

  }
);


/* =====================================================
   26. 시작 화면에서 학교 정보 표시
   ===================================================== */

showPlaceInformation("school");
  </script>
